name: brew pr-pull

on:
  pull_request_target:
    types:
      - closed

jobs:
  pr-pull:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: |
          # We need to temporarily reset the main branch to the state BEFORE the merge commit
          # so that pr-pull can successfully apply the bottle commit and re-push.
          git fetch origin main
          git checkout main
          git reset --hard HEAD~1
          brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits (Force push to overwrite the standard merge)
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main
          force: true
